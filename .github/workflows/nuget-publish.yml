name: Publish to NuGet

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0, v2.1.0, etc.
      - '[0-9]*' # Also support bare version tags like 1.0.0, 2.1.0, etc.
  workflow_dispatch: # Manual trigger

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore Log4Net.Appender.Grafana.Loki.csproj

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        $ref = $env:GITHUB_REF
        if ($ref -match '^refs/tags/v(.+)$') {
          $ver = $Matches[1]
        } elseif ($ref -match '^refs/tags/(.+)$') {
          $ver = $Matches[1]
        } else {
          $ver = "0.0.0-dev"
        }
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        Write-Host "Package version: $ver"

    - name: Build project
      run: dotnet build Log4Net.Appender.Grafana.Loki.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }} /p:TreatWarningsAsErrors=false

    - name: Pack NuGet package
      run: dotnet pack Log4Net.Appender.Grafana.Loki.csproj -c Release --no-build -o ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Upload NuGet package artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg

    - name: Publish to NuGet.org
      shell: pwsh
      if: github.event_name == 'push'
      run: |
        $pkg = Get-ChildItem -Path ./nupkg -Filter *.nupkg | Select-Object -First 1
        if (-not $pkg) { Write-Error "No .nupkg file found in ./nupkg"; exit 1 }
        Write-Host "Publishing $($pkg.FullName)"
        dotnet nuget push $pkg.FullName -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Publish to GitHub Packages
      shell: pwsh
      if: github.event_name == 'push'
      run: |
        $pkg = Get-ChildItem -Path ./nupkg -Filter *.nupkg | Select-Object -First 1
        if (-not $pkg) { Write-Error "No .nupkg file found in ./nupkg"; exit 1 }
        Write-Host "Publishing $($pkg.FullName) to GitHub Packages"
        dotnet nuget push $pkg.FullName -k ${{ secrets.GITHUB_TOKEN }} -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
