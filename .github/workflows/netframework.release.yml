name: Dot Net Framework (Release)

on:
  push:
    tags:
      - '*'

# Delegate all release/publish work to the nuget-publish workflow.
# This workflow is intentionally left as a no-op to avoid duplicate runs.
# Tag pushes matching 'v*' are handled by nuget-publish.yml.
jobs:
  skipped:
    runs-on: ubuntu-latest
    steps:
      - name: Release handled by nuget-publish workflow
        run: echo "Release packaging and publishing is handled by the nuget-publish.yml workflow."
